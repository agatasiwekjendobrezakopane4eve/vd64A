<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Watch These Videos Together</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="Watch These Videos Together">
  <meta property="og:description" content="Multi-platform video grid – click to unlock and watch.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://agatasiwekjendobrezakopane4eve.github.io/vd64/grid-thumb-collage-20260609_005459.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://agatasiwekjendobrezakopane4eve.github.io/vd64/grid-thumb-collage-20260609_005459.png">
  <style>
body { margin:0; padding:0; background:#000; color:#fff; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.header { text-align:center; padding:16px 8px 8px; }
.header h1 { margin:0; font-size:24px; }
.header .subtitle { margin-top:4px; font-size:13px; opacity:.8; }
#openAllBtn { margin-top:12px; padding:8px 16px; border-radius:999px; border:none; background:#f90; color:#000; font-weight:600; cursor:pointer; }
.grid { display:grid; grid-template-columns: repeat(6, minmax(260px, 1fr)); gap:16px; padding:16px; box-sizing:border-box; }
.tile { background:#111; border-radius:10px; overflow:hidden; box-shadow:0 0 6px rgba(0,0,0,.6); }
.embed-wrapper { position:relative; width:100%; padding-top:56.25%; background:#000; }
.embed-wrapper iframe { position:absolute; inset:0; width:100%; height:100%; }
.fallback-card { display:flex; gap:14px; align-items:center; padding:12px 14px; cursor:pointer; border-top:1px solid #222; }
.fallback-card:hover { background:#181818; }
.fallback-thumb-wrapper img { max-width:220px; max-height:140px; object-fit:cover; border-radius:8px; }
.fallback-url { font-size:11px; opacity:.7; word-break:break-all; }
.footer { text-align:center; font-size:11px; padding:8px; opacity:.7; }
@media (max-width:768px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div class="header">
    <h1>Watch These Videos Together</h1>
    <div class="subtitle">Grid · all visible at once · click any to play.</div>
    <button id="openAllBtn">Open all videos in new tabs</button>
    <div style="margin-top:6px;font-size:12px;opacity:.7;">Layout: fixed 6 columns on wide screens</div>
  </div>
  <div class="grid">
    <div class="tile">
  <div class="fallback-card" onclick="window.open('""', '_blank')">
  
  <div class="fallback-text">
    <div class="fallback-title">Video</div>
    <div class="fallback-sub">Open on Video</div>
    <div class="fallback-url">""</div>
  </div>
</div>
</div>
<div class="tile">
  <div class="embed-wrapper">
  <iframe src="https://www.youtube.com/embed/H0s1bm9oNEI" title="YouTube video" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>
</div>
<div class="tile">
  <div class="embed-wrapper">
  <iframe src="https://www.youtube.com/embed/j7uybnwnE64" title="YouTube video" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>
</div>
<div class="tile">
  <div class="embed-wrapper">
  <iframe src="https://www.youtube.com/embed/gcOWPOmOR-s" title="YouTube video" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>
</div>
<div class="tile">
  <div class="embed-wrapper">
  <iframe src="https://www.youtube.com/embed/VAhAfCTB_S0" title="YouTube video" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen></iframe>
</div>
</div>
  </div>
  <div class="footer">[20260609_005500]</div>
<script>
  const allVideoUrls = [
    '""',
    'https://www.youtube.com/watch?v=H0s1bm9oNEI',
    'https://www.youtube.com/watch?v=j7uybnwnE64&list=RDj7uybnwnE64&start_radio=1',
    'https://www.youtube.com/watch?v=gcOWPOmOR-s',
    'https://www.youtube.com/watch?v=VAhAfCTB_S0&list=RDVAhAfCTB_S0&start_radio=1'
  ];
  document.getElementById('openAllBtn').addEventListener('click', () => {
    const delay = 500;
    allVideoUrls.forEach((u, idx) => {
      setTimeout(() => { try { window.open(u, '_blank'); } catch(e) {} }, idx*delay);
    });
  });
</script>
</body>
</html>
